# Skill Dispatch Defaults
#
# 全局默认的 skill 调度规则。sdd-init 根据检测到的技术栈，
# 将匹配的规则注入到项目的 config.yaml 中。
#
# 数据结构：
# defaults:
#   - trigger:
#       tech_stack: [<string>, ...]  # 必填：技术栈标识数组
#       path_pattern: <string>       # 可选：glob 模式
#       tags: [<string>, ...]        # 可选：保留扩展位
#     phases: [<string>, ...]        # 必填：SDD action 名称数组
#     skill: <string>                # 必填：skill 名称

defaults:
  # Python + FastAPI 技术栈
  - trigger:
      tech_stack: [python, fastapi]
    phases: [apply, review]
    skill: "0xdarkmatter-python-fastapi-patterns"

  # Python + FastAPI + SQLAlchemy（更具体）
  - trigger:
      tech_stack: [python, fastapi, sqlalchemy]
    phases: [apply, review]
    skill: "0xdarkmatter-python-fastapi-patterns"

  # TypeScript + Vue 前端
  - trigger:
      tech_stack: [typescript, vue]
    phases: [apply]
    skill: "ui-ux-pro-max"

  # Go 后端
  - trigger:
      tech_stack: [go]
    phases: [apply, review]
    skill: "golang-patterns"

  # Node.js 后端
  - trigger:
      tech_stack: [nodejs]
    phases: [apply, review]
    skill: "nodejs-patterns"

  # Rust
  - trigger:
      tech_stack: [rust]
    phases: [apply, review]
    skill: "rust-patterns"
